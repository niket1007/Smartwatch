; PlatformIO project config for the AMOLED ESP32-S3 smartwatch.
; Every setting below is copied directly from your Arduino IDE Tools menu
; (board: ESP32S3 Dev Module, core 3.2.0) so behavior matches exactly.

[env:smartwatch]
; IMPORTANT: official PlatformIO's `espressif32` platform only supports
; Arduino core 2.x - there is no official 3.x support. This points at the
; pioarduino community fork instead, pinned to the EXACT release that ships
; core 3.2.0 (matching your Arduino IDE). Do NOT use the "stable" URL here -
; that always tracks the latest pioarduino release (currently 3.3.9), and
; arduino-esp32 changed the spiFrequencyToClockDiv() signature between 3.2.0
; and 3.3.x, which breaks the vendored Arduino_GFX library you copied in -
; that's the exact error you just hit.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino, espidf

; ---- Matches Tools menu exactly ----
; CPU Frequency: 240MHz
board_build.f_cpu = 240000000L
; Flash Mode: QIO 80MHz
board_build.flash_mode = qio
board_build.f_flash = 80000000L
; Flash Size: 16MB
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
; PSRAM: OPI PSRAM (+ Flash Mode QIO) -> qio_opi memory type
; board_build.arduino.memory_type = qio_opi
; Partition Scheme: 16M Flash (3MB APP/9.9MB FATFS)
board_build.partitions = partitions.csv

build_flags =
    -DBOARD_HAS_PSRAM
    ; USB CDC On Boot: Enabled
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; USB Mode: Hardware CDC and JTAG
    -DARDUINO_USB_MODE=1
    ; Core Debug Level: None
    -DCORE_DEBUG_LEVEL=0
    ; Events Run On Core 1 / Arduino Runs On Core 1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

board_build.embed_txtfiles = 
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt
    ; (Add other paths if needed, see full documentation)